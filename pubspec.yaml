name: nashmi_jordanian_ride
description: "Nashmi - A smart ride-sharing app for Jordan"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6
  provider: ^6.0.0

  # Navigation
  go_router: ^12.0.0

  # API & Networking
  dio: ^5.3.0
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Location & Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^10.0.0
  location: ^5.0.0

  # Authentication
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  google_sign_in: ^6.1.0

  # UI & Design
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Date & Time
  intl: ^0.19.0
  timeago: ^3.6.0

  # Validation
  email_validator: ^2.1.0

  # Utilities
  uuid: ^4.0.0
  logger: ^2.0.0

  # Payment Integration (Optional for Phase 2)
  # stripe_flutter: ^9.4.0
  # pay: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
